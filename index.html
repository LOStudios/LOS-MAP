<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lexington Open Studios 2026 — Map</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--ink:#1a1714;--paper:#f7f4ef;--warm-mid:#e8e2d9;--accent:#8B3A2A;--lexart:#2A5C8B;--munroe:#3A7A52;--home:#8B3A2A;--serif:'Cormorant Garamond',Georgia,serif;--sans:'DM Sans',system-ui,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);min-height:100vh}
header{background:var(--ink);color:var(--paper);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.header-title h1{font-family:var(--serif);font-size:1.55rem;font-weight:500;letter-spacing:.02em}
.header-title p{font-size:.75rem;opacity:.55;letter-spacing:.08em;text-transform:uppercase;margin-top:2px}
.tab-bar{display:flex;gap:4px}
.tab-btn{background:transparent;border:1px solid rgba(255,255,255,.2);color:var(--paper);padding:7px 16px;font-family:var(--sans);font-size:.78rem;letter-spacing:.05em;cursor:pointer;transition:all .2s;text-transform:uppercase}
.tab-btn:hover{background:rgba(255,255,255,.1)}
.tab-btn.active{background:var(--paper);color:var(--ink);border-color:var(--paper)}
.legend-bar{background:var(--warm-mid);padding:9px 28px;display:flex;gap:20px;align-items:center;flex-wrap:wrap;border-bottom:1px solid #d8d2c8}
.legend-item{display:flex;align-items:center;gap:7px;font-size:.78rem;letter-spacing:.03em}
.legend-dot{width:13px;height:13px;border-radius:50%;border:2px solid white;box-shadow:0 1px 3px rgba(0,0,0,.25);flex-shrink:0}
.dot-munroe{background:var(--munroe)}.dot-lexart{background:var(--lexart)}.dot-home{background:var(--home)}
#map-view,#print-view{display:none}
#map-view.active,#print-view.active{display:flex}
#map-view{height:calc(100vh - 108px);position:relative}
#map{flex:1;height:100%}
.sidebar{width:300px;background:var(--paper);border-left:1px solid #d8d2c8;overflow-y:auto;display:flex;flex-direction:column}
.sidebar-header{padding:14px 18px 10px;border-bottom:1px solid #d8d2c8;background:var(--warm-mid)}
.sidebar-header h3{font-family:var(--serif);font-size:1rem;font-weight:500}
.sidebar-header p{font-size:.72rem;opacity:.55;margin-top:2px}
.filter-row{padding:10px 18px;border-bottom:1px solid #d8d2c8;display:flex;gap:5px;flex-wrap:wrap}
.filter-btn{border:1px solid #ccc;background:white;border-radius:20px;padding:3px 11px;font-size:.72rem;cursor:pointer;transition:all .15s;font-family:var(--sans)}
.filter-btn.active-munroe{background:var(--munroe);color:white;border-color:var(--munroe)}
.filter-btn.active-lexart{background:var(--lexart);color:white;border-color:var(--lexart)}
.filter-btn.active-home{background:var(--home);color:white;border-color:var(--home)}
.filter-btn.active-all{background:var(--ink);color:white;border-color:var(--ink)}
.artist-list{flex:1;overflow-y:auto}
.artist-card{padding:10px 18px;border-bottom:1px solid #ede8e0;cursor:pointer;transition:background .12s;display:flex;gap:10px;align-items:flex-start}
.artist-card:hover{background:#f0ebe3}
.artist-card.selected{background:#ede5d8}
.card-thumb{width:44px;height:44px;border-radius:3px;object-fit:cover;flex-shrink:0;background:#e8e2d9}
.card-thumb-placeholder{width:44px;height:44px;border-radius:3px;flex-shrink:0;background:#e8e2d9;display:flex;align-items:center;justify-content:center;font-size:.9rem;color:#aaa}
.map-number{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:600;color:white;flex-shrink:0;margin-top:1px}
.num-munroe{background:var(--munroe)}.num-lexart{background:var(--lexart)}.num-home{background:var(--home)}
.artist-info h4{font-family:var(--serif);font-size:.9rem;font-weight:500;line-height:1.2}
.artist-info .medium{font-size:.7rem;color:#666;margin-top:2px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.artist-info .location-tag{font-size:.65rem;text-transform:uppercase;letter-spacing:.06em;margin-top:3px;opacity:.45}
.section-header{padding:7px 18px;background:#ede8e0;font-size:.68rem;text-transform:uppercase;letter-spacing:.08em;font-weight:500;color:#555;position:sticky;top:0;z-index:1}

/* Popup */
.leaflet-popup-content-wrapper{border-radius:4px;box-shadow:0 4px 20px rgba(0,0,0,.15);border:1px solid #d8d2c8;padding:0}
.leaflet-popup-content{margin:0!important;width:280px!important}
.popup-img{width:100%;height:160px;object-fit:cover;display:block;background:#e8e2d9}
.popup-img-placeholder{width:100%;height:80px;background:#e8e2d9;display:flex;align-items:center;justify-content:center;color:#aaa;font-size:.8rem}
.popup-body{padding:14px}
.popup-type{font-size:.66rem;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;font-weight:500}
.popup-type.munroe{color:var(--munroe)}.popup-type.lexart{color:var(--lexart)}.popup-type.home{color:var(--home)}
.popup-body h3{font-family:var(--serif);font-size:1.05rem;font-weight:500;margin-bottom:3px}
.popup-address{font-size:.72rem;color:#777;margin-bottom:6px}
.popup-desc{font-size:.77rem;line-height:1.5;color:#444;margin-bottom:8px}
.popup-artists-list{font-size:.72rem;line-height:1.8;color:#333}
.popup-artists-list strong{display:block;font-size:.65rem;text-transform:uppercase;letter-spacing:.07em;color:#888;margin-bottom:3px}
.popup-website{display:inline-block;margin-top:6px;font-size:.7rem;color:var(--accent);text-decoration:none;border-bottom:1px solid currentColor}

/* Print view */
#print-view{flex-direction:column;padding:36px;max-width:880px;margin:0 auto;width:100%}
.print-header{text-align:center;margin-bottom:32px;padding-bottom:20px;border-bottom:2px solid var(--ink)}
.print-header h1{font-family:var(--serif);font-size:2rem;font-weight:400;letter-spacing:.04em}
.print-header p{font-size:.82rem;letter-spacing:.1em;text-transform:uppercase;margin-top:5px;opacity:.55}
.print-btn{background:var(--ink);color:var(--paper);border:none;padding:9px 22px;font-family:var(--sans);font-size:.78rem;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;margin-bottom:28px;align-self:flex-start}
.print-btn:hover{background:#333}
.print-section{margin-bottom:28px}
.print-section-title{font-family:var(--serif);font-size:1.1rem;font-weight:600;padding:7px 0;border-bottom:1px solid #d8d2c8;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.print-section-title .num-badge{width:26px;height:26px;border-radius:50%;color:white;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:600;font-family:var(--sans);flex-shrink:0}
.print-section-title .section-address{font-size:.72rem;font-weight:400;font-family:var(--sans);opacity:.5;margin-left:auto}
.print-artists-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px 28px}
.print-artist-row{display:flex;gap:10px;align-items:flex-start;padding:7px 0;border-bottom:1px solid #ede8e0}
.print-thumb{width:52px;height:52px;border-radius:3px;object-fit:cover;flex-shrink:0;background:#e8e2d9}
.print-artist-info h4{font-family:var(--serif);font-size:.9rem;font-weight:500}
.print-artist-info .p-business{font-size:.7rem;color:#666;font-style:italic}
.print-artist-info .p-medium{font-size:.68rem;color:#777;margin-top:2px;line-height:1.4}
.print-artist-info .p-address{font-size:.67rem;color:#999;margin-top:1px}

/* Loading */
.loading-overlay{position:fixed;inset:0;background:var(--paper);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:14px}
.loading-overlay h2{font-family:var(--serif);font-size:1.3rem;font-weight:400}
.loading-overlay p{font-size:.78rem;opacity:.5}
.spinner{width:30px;height:30px;border:2px solid #d8d2c8;border-top-color:var(--ink);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media print{
  header,.legend-bar,.tab-bar,.print-btn{display:none!important}
  #map-view{display:none!important}
  #print-view{display:flex!important;padding:0}
  body{background:white}
}
</style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <h2>Lexington Open Studios 2026</h2>

<header>
  <div class="header-title">

      <button class="filter-btn" onclick="filterList('munroe',this)">Munroe</button>
      <button class="filter-btn" onclick="filterList('lexart',this)">LexArt</button>
      <button class="filter-btn" onclick="filterList('home',this)">Home Studios</button>
    </div>
    <div class="artist-list" id="artist-list"></div>
  </div>
</div>

<div id="print-view">
  <button class="print-btn" onclick="window.print()">⎙ Print / Save PDF</button>
  <div id="print-content"></div>
</div>

function colorFor(t){return t==='munroe'?'#3A7A52':t==='lexart'?'#2A5C8B':'#8B3A2A'}

function processArtists(){
  const norm=loc=>{const l=(loc||'').toLowerCase();if(l.includes('munroe'))return 'munroe';if(l.includes('lexart')||l.includes('lex art'))return 'lexart';return 'home';};
  const artists=RAW_ARTISTS.map(a=>({...a,locType:norm(a.locationType),fullName:(a.firstName+' '+a.lastName).trim()}));
  const munroe=artists.filter(a=>a.locType==='munroe').sort((a,b)=>a.lastName.localeCompare(b.lastName));
  const lexart=artists.filter(a=>a.locType==='lexart').sort((a,b)=>a.lastName.localeCompare(b.lastName));
  const home=artists.filter(a=>a.locType==='home').sort((a,b)=>a.lastName.localeCompare(b.lastName));
  munroe.forEach(a=>{a.mapNum=1});
  lexart.forEach(a=>{a.mapNum=2});
  home.forEach((a,i)=>{a.mapNum=i+3});
  return{munroe,lexart,home,all:[...munroe,...lexart,...home]};
}

const {munroe,lexart,home:homeStudios,all:allArtists}=processArtists();
let map,markers=[],currentFilter='all';



function makeIcon(num,locType){
  const color=colorFor(locType);
  const size=locType==='home'?28:34;
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size+8}" viewBox="0 0 ${size} ${size+8}"><ellipse cx="${size/2}" cy="${size+4}" rx="${size/3}" ry="4" fill="rgba(0,0,0,0.15)"/><circle cx="${size/2}" cy="${size/2}" r="${size/2-2}" fill="${color}" stroke="white" stroke-width="2"/><text x="${size/2}" y="${size/2+4.5}" text-anchor="middle" fill="white" font-size="${num>9?10:12}" font-family="DM Sans,sans-serif" font-weight="600">${num}</text></svg>`;
  return L.divIcon({html:svg,className:'',iconSize:[size,size+8],iconAnchor:[size/2,size+8],popupAnchor:[0,-(size+8)]});
}

function imgTag(url,cls,alt){
  return `<img class="${cls}" src="${url}" alt="${alt}" onerror="this.style.display='none'">`;
}

function buildPopup(a){
  const typeLabel=a.locType==='munroe'?'Munroe Center for the Arts':a.locType==='lexart'?'LexArt':'Home Studio';
  const website=a.website&&a.website!=='http://None'&&a.website?`<a class="popup-website" href="${a.website}" target="_blank">Visit Website ↗</a>`:'';
  const desc=a.statement?`<div class="popup-desc">${a.statement.substring(0,200)}${a.statement.length>200?'…':''}</div>`:(a.medium?`<div class="popup-desc">${a.medium}</div>`:'');
  const addr=a.locType==='home'?`<div class="popup-address">${a.address}, ${a.city}</div>`:'';
  return `${imgTag(a.imgUrl,'popup-img',a.fullName)}<div class="popup-body"><div class="popup-type ${a.locType}">#${a.mapNum} · ${typeLabel}</div><h3>${a.fullName}</h3>${a.business&&a.business!==a.fullName?`<div class="popup-address" style="font-style:italic">${a.business}</div>`:''} ${addr}${desc}${website}</div>`;
}

function buildCommunityPopup(locType,list,address){
  const label=locType==='munroe'?'Munroe Center for the Arts':'LexArt';
  const names=list.map(a=>`<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">${imgTag(a.imgUrl,'card-thumb',a.fullName)} <span>${a.fullName}</span></div>`).join('');
  return `<div class="popup-body"><div class="popup-type ${locType}">#${list[0].mapNum} · ${label}</div><h3>${label}</h3><div class="popup-address">${address}</div><div class="popup-artists-list"><strong>${list.length} Artists</strong>${names}</div></div>`;
}

function initMap(){
  map=L.map('map').setView([42.4534,-71.2239],13);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap contributors, © CARTO',maxZoom:19}).addTo(map);

  const munroeLL=[42.4505,-71.2169];
  const lexartLL=[42.4411,-71.2350];

  const mM=L.marker(munroeLL,{icon:makeIcon(1,'munroe')}).addTo(map).bindPopup(buildCommunityPopup('munroe',munroe,'1403 Massachusetts Ave'),{maxHeight:400});
  markers.push({marker:mM,locType:'munroe'});

  const lM=L.marker(lexartLL,{icon:makeIcon(2,'lexart')}).addTo(map).bindPopup(buildCommunityPopup('lexart',lexart,'130 Waltham Street'),{maxHeight:400});
  markers.push({marker:lM,locType:'lexart'});

  for(const artist of homeStudios){
    if(artist.lat&&artist.lng){
      const m=L.marker([artist.lat,artist.lng],{icon:makeIcon(artist.mapNum,'home')}).addTo(map).bindPopup(buildPopup(artist));
      markers.push({marker:m,locType:'home',entryId:artist.entryId});
    }
  }

  document.getElementById('artist-count').textContent=`${allArtists.length} artists · ${homeStudios.length} home studios`;
  buildSidebar();
  document.getElementById('loading').style.display='none';
}

function buildSidebar(filter='all'){
  const list=document.getElementById('artist-list');
  list.innerHTML='';
  const sections=[
    {label:'Munroe Center for the Arts',artists:munroe,locType:'munroe'},
    {label:'LexArt — 130 Waltham St',artists:lexart,locType:'lexart'},
    {label:'Home Studios',artists:homeStudios,locType:'home'},
  ];
  for(const sec of sections){
    if(filter!=='all'&&filter!==sec.locType)continue;
    const h=document.createElement('div');
    h.className='section-header';
    h.textContent=`#${sec.artists[0]?.mapNum??''} ${sec.label}`;
    list.appendChild(h);
    for(const a of sec.artists){
      const card=document.createElement('div');
      card.className='artist-card';
      const thumb=a.imgUrl?`<img class="card-thumb" src="${a.imgUrl}" alt="${a.fullName}" onerror="this.outerHTML='<div class=\\"card-thumb-placeholder\\">🎨</div>'">`:`<div class="card-thumb-placeholder">🎨</div>`;
      card.innerHTML=`${thumb}<div class="artist-info"><h4>${a.fullName}</h4>${a.medium?`<div class="medium">${a.medium}</div>`:''}</div>`;
      card.addEventListener('click',()=>{
        if(sec.locType!=='home'){const t=markers.find(m=>m.locType===sec.locType);if(t){t.marker.openPopup();map.panTo(t.marker.getLatLng());}}
        else{const t=markers.find(m=>m.entryId===a.entryId);if(t){t.marker.openPopup();map.panTo(t.marker.getLatLng());}}
        document.querySelectorAll('.artist-card').forEach(c=>c.classList.remove('selected'));
        card.classList.add('selected');
      });
      list.appendChild(card);
    }
  }
}

function filterList(type,btn){
  currentFilter=type;
  document.querySelectorAll('.filter-btn').forEach(b=>{b.className='filter-btn'});
  btn.className=`filter-btn active-${type}`;
  buildSidebar(type);
  markers.forEach(({marker,locType})=>{type==='all'||type===locType?marker.addTo(map):marker.remove()});
}

function buildPrintView(){
  const c=document.getElementById('print-content');
  c.innerHTML='';
  const hd=document.createElement('div');
  hd.className='print-header';
  hd.innerHTML='<h1>Lexington Open Studios 2026</h1><p>April 11–12 · 11am to 5pm · Lexington, Massachusetts</p>';
  c.appendChild(hd);
  const sections=[
    {label:'Munroe Center for the Arts',address:'1403 Massachusetts Ave, Lexington',artists:munroe,locType:'munroe',num:1},
    {label:'LexArt',address:'130 Waltham Street, Lexington',artists:lexart,locType:'lexart',num:2},
    {label:'Home Studios',address:'Throughout Lexington & neighboring towns',artists:homeStudios,locType:'home',num:null},
  ];
  for(const sec of sections){
    const sd=document.createElement('div');sd.className='print-section';
    const numStr=sec.num!==null?sec.num:`3–${homeStudios.length+2}`;
    const td=document.createElement('div');td.className='print-section-title';
    td.innerHTML=`<div class="num-badge" style="background:${colorFor(sec.locType)}">${numStr}</div>${sec.label}<span class="section-address">${sec.address}</span>`;
    sd.appendChild(td);
    const grid=document.createElement('div');grid.className='print-artists-grid';
    for(const a of sec.artists){
      const row=document.createElement('div');row.className='print-artist-row';
      const addrHtml=sec.locType==='home'?`<div class="p-address">${a.address}, ${a.city}</div>`:'';
      const webHtml=a.website&&a.website!=='http://None'?`<div class="p-address" style="color:#8B3A2A">${a.website.replace(/^https?:\/\//,'')}</div>`:'';
      row.innerHTML=`<img class="print-thumb" src="${a.imgUrl}" alt="${a.fullName}" onerror="this.style.display='none'"><div class="print-artist-info"><h4>${a.fullName}</h4>${a.business&&a.business!==a.fullName?`<div class="p-business">${a.business}</div>`:''}<div class="p-medium">${a.medium||''}</div>${addrHtml}${webHtml}</div>`;
      grid.appendChild(row);
    }
    sd.appendChild(grid);c.appendChild(sd);
  }
}

function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&tab==='map')||(i===1&&tab==='print')));
  document.getElementById('map-view').classList.toggle('active',tab==='map');
  document.getElementById('print-view').classList.toggle('active',tab==='print');
  if(tab==='print')buildPrintView();
  if(tab==='map')setTimeout(()=>map.invalidateSize(),100);
}

window.addEventListener('DOMContentLoaded',initMap);
</script>
</body>
</html>
